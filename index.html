<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASIO AZ-90J Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --bg-color: #1e2021;
            --lcd-bg: #b8c2a9;
            --orange-btn: #c98e3d;
            --blue-btn: #6a9696;
            --grey-btn: #4a4c4e;
            --dark-grey-btn: #323436;
            --red-btn: #a34d3d;
            --ac-btn: #8c4235;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .calculator {
            width: 320px;
            height: 570px;
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lcd-screen {
            background-color: var(--lcd-bg);
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            flex-grow: 1;
        }

        .btn {
            height: 38px;
            border-radius: 6px;
            color: white;
        }

        .btn-orange { background-color: var(--orange-btn); }
        .btn-blue { background-color: var(--blue-btn); }
        .btn-grey { background-color: var(--grey-btn); }
        .btn-dark { background-color: var(--dark-grey-btn); }
        .btn-red { background-color: var(--red-btn); }
        .btn-ac { background-color: var(--ac-btn); }
    </style>
</head>

<body>

<div class="calculator">
    <div id="lcd" class="lcd-screen">0</div>

    <div class="grid-container">
        <button class="btn btn-orange" onclick="fn('inv')">1/x</button>
        <button class="btn btn-orange" onclick="fn('sq')">x²</button>
        <button class="btn btn-orange" onclick="num('(')">(</button>
        <button class="btn btn-orange" onclick="num(')')">)</button>
        <button class="btn btn-orange" onclick="fn('pow')">x^y</button>

        <button class="btn btn-orange" onclick="fn('pi')">π</button>
        <button class="btn btn-orange" onclick="fn('pm')">±</button>
        <button class="btn btn-orange" onclick="fracAction('to')">と</button>
        <button class="btn btn-orange" onclick="fracAction('bunnno')">分の</button>
        <button class="btn btn-orange" onclick="fracAction('shosuu')">小</button>

        <button class="btn btn-dark" onclick="backspace()">←</button>
        <button class="btn btn-blue" onclick="mem('mc')">MC</button>
        <button class="btn btn-blue" onclick="mem('mr')">MR</button>
        <button class="btn btn-blue" onclick="mem('m-')">M-</button>
        <button class="btn btn-grey" onclick="op('/')">÷</button>

        <button class="btn btn-blue" onclick="mem('m+')">M+</button>
        <button class="btn btn-dark" onclick="num(7)">7</button>
        <button class="btn btn-dark" onclick="num(8)">8</button>
        <button class="btn btn-dark" onclick="num(9)">9</button>
        <button class="btn btn-grey" onclick="op('*')">×</button>

        <button class="btn btn-grey" onclick="fn('perc')">%</button>
        <button class="btn btn-dark" onclick="num(4)">4</button>
        <button class="btn btn-dark" onclick="num(5)">5</button>
        <button class="btn btn-dark" onclick="num(6)">6</button>
        <button class="btn btn-grey" onclick="op('-')">-</button>

        <button class="btn btn-grey" onclick="fn('sqrt')">√</button>
        <button class="btn btn-dark" onclick="num(1)">1</button>
        <button class="btn btn-dark" onclick="num(2)">2</button>
        <button class="btn btn-dark" onclick="num(3)">3</button>
        <button class="btn btn-grey" onclick="op('+')">+</button>

        <button class="btn btn-red" onclick="clearEntry()">C</button>
        <button class="btn btn-ac" onclick="allClear()">AC</button>
        <button class="btn btn-dark" onclick="num(0)">0</button>
        <button class="btn btn-dark" onclick="num('.')">.</button>
        <button class="btn btn-grey" onclick="calculate()">=</button>
    </div>
</div>

<script>
// ===== 状態 =====
let currentInput="0";
let prevInput="";
let operation=null;
let shouldReset=false;
let memory=0;

let fraction={whole:"",numerator:"",denominator:"",active:"none"};

// ===== フォーマット =====
function formatNumber(num){
    if(!isFinite(num)) return "ERROR";
    if(Math.abs(num)<1e-10) return "0";
    return parseFloat(num.toPrecision(10)).toString();
}

// ===== 表示 =====
function updateDisplay(){
    document.getElementById("lcd").innerText=currentInput;
}

// ===== 入力 =====
function num(n){
    if(shouldReset){
        currentInput=n.toString();
        shouldReset=false;
    }else{
        if(n==="." && currentInput.includes(".")) return;
        if(currentInput==="0" && n!==".") currentInput=n.toString();
        else currentInput+=n;
    }
    updateDisplay();
}

function backspace(){
    currentInput=currentInput.length>1?currentInput.slice(0,-1):"0";
    updateDisplay();
}

// ===== 分数 =====
function fracAction(type){
    if(type==="shosuu"){
        currentInput=formatNumber(getFraction());
        resetFraction();
    }
    updateDisplay();
}

function getFraction(){return 0;}
function resetFraction(){fraction={};}

// ===== 演算 =====
function op(o){
    if(operation && !shouldReset) calculate();
    prevInput=currentInput;
    operation=o;
    shouldReset=true;
}

function calculate(){
    let a=parseFloat(prevInput);
    let b=parseFloat(currentInput);
    let r;

    switch(operation){
        case "+": r=a+b; break;
        case "-": r=a-b; break;
        case "*": r=a*b; break;
        case "/": r=(b===0)?Infinity:a/b; break;
        case "pow": r=Math.pow(a,b); break;
    }

    currentInput=formatNumber(r);
    operation=null;
    shouldReset=true;
    updateDisplay();
}

// ===== メモリ =====
function mem(type){
    let v=parseFloat(currentInput)||0;
    if(type==="m+") memory+=v;
    if(type==="m-") memory-=v;
    if(type==="mr"){
        currentInput=formatNumber(memory);
        shouldReset=true;
    }
    if(type==="mc") memory=0;
    updateDisplay();
}

// ===== クリア =====
function allClear(){
    currentInput="0";
    prevInput="";
    operation=null;
    shouldReset=false;
    updateDisplay();
}

function clearEntry(){
    currentInput="0";
    updateDisplay();
}

// ===== 関数 =====
function fn(type){
    let v=parseFloat(currentInput)||0;

    switch(type){
        case "sq": currentInput=formatNumber(v*v); break;
        case "sqrt": currentInput=v<0?"ERROR":formatNumber(Math.sqrt(v)); break;
        case "inv": currentInput=v===0?"ERROR":formatNumber(1/v); break;
        case "pi":
            currentInput="3.141592653";
            shouldReset=true;
            break;
        case "pm": currentInput=formatNumber(-v); break;
        case "pow":
            operation="pow";
            prevInput=currentInput;
            shouldReset=true;
            break;
    }

    updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
