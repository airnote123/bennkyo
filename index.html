<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASIO AZ-90J 完全版</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:sans-serif;
}

.calc{
    width:320px;
    background:#1e2021;
    padding:15px;
    border-radius:12px;
}

.display{
    background:#b8c2a9;
    height:80px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    font-size:28px;
    padding:10px;
    font-family:monospace;
}

.grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
}

button{
    height:40px;
    border-radius:6px;
    color:white;
}

.dark{background:#323436;}
.grey{background:#4a4c4e;}
.orange{background:#c98e3d;}
.red{background:#a34d3d;}
.ac{background:#8c4235;}
.blue{background:#6a9696;}
</style>
</head>

<body>

<div class="calc">
    <div id="display" class="display">0</div>

    <div class="grid">
        <button class="orange" onclick="fn('inv')">1/x</button>
        <button class="orange" onclick="fn('sq')">x²</button>
        <button class="orange" onclick="num('(')">(</button>
        <button class="orange" onclick="num(')')">)</button>
        <button class="orange" onclick="fn('pow')">x^y</button>

        <button class="orange" onclick="fn('pi')">π</button>
        <button class="orange" onclick="fn('pm')">±</button>
        <button class="orange" onclick="fracAction('to')">と</button>
        <button class="orange" onclick="fracAction('bunnno')">分の</button>
        <button class="orange" onclick="fracAction('shosuu')">小数</button>

        <button class="dark" onclick="backspace()">←</button>
        <button class="blue" onclick="mem('mc')">MC</button>
        <button class="blue" onclick="mem('mr')">MR</button>
        <button class="blue" onclick="mem('m-')">M-</button>
        <button class="grey" onclick="op('/')">÷</button>

        <button class="blue" onclick="mem('m+')">M+</button>
        <button class="dark" onclick="num(7)">7</button>
        <button class="dark" onclick="num(8)">8</button>
        <button class="dark" onclick="num(9)">9</button>
        <button class="grey" onclick="op('*')">×</button>

        <button class="grey" onclick="fn('perc')">%</button>
        <button class="dark" onclick="num(4)">4</button>
        <button class="dark" onclick="num(5)">5</button>
        <button class="dark" onclick="num(6)">6</button>
        <button class="grey" onclick="op('-')">-</button>

        <button class="grey" onclick="fn('sqrt')">√</button>
        <button class="dark" onclick="num(1)">1</button>
        <button class="dark" onclick="num(2)">2</button>
        <button class="dark" onclick="num(3)">3</button>
        <button class="grey" onclick="op('+')">+</button>

        <button class="red" onclick="clearEntry()">C</button>
        <button class="ac" onclick="allClear()">AC</button>
        <button class="dark" onclick="num(0)">0</button>
        <button class="dark" onclick="num('.')">.</button>
        <button class="grey" onclick="calculate()">=</button>
    </div>
</div>

<script>

// ===== 状態 =====
let currentInput="0";
let prevInput="";
let operation=null;
let shouldReset=false;
let memory=0;

let fraction={
    whole:"",
    numerator:"",
    denominator:"",
    active:"none"
};

// ===== 表示 =====
function formatNumber(num){
    if(!isFinite(num)) return "ERROR";
    if(Math.abs(num)<1e-10) return "0";
    return parseFloat(num.toPrecision(10)).toString();
}

function update(){
    document.getElementById("display").innerText=currentInput;
}

// ===== 入力 =====
function num(n){
    if(shouldReset){
        currentInput=n.toString();
        shouldReset=false;
    }else{
        if(n==="." && currentInput.includes(".")) return;
        if(currentInput==="0" && n!==".") currentInput=n.toString();
        else currentInput+=n;
    }
    update();
}

function backspace(){
    currentInput=currentInput.length>1?currentInput.slice(0,-1):"0";
    update();
}

// ===== 分数 =====
function fracAction(type){
    switch(type){
        case "to":
            fraction.whole=currentInput;
            fraction.active="numerator";
            currentInput="";
            break;

        case "bunnno":
            if(fraction.active==="numerator"){
                fraction.numerator=currentInput;
                fraction.active="denominator";
                currentInput="";
            }
            break;

        case "shosuu":
            currentInput=formatNumber(getFraction());
            resetFraction();
            break;
    }
    update();
}

function getFraction(){
    let w=parseFloat(fraction.whole)||0;
    let n=parseFloat(fraction.numerator)||0;
    let d=parseFloat(currentInput)||1;
    if(d===0) return Infinity;
    return w+n/d;
}

function resetFraction(){
    fraction={whole:"",numerator:"",denominator:"",active:"none"};
}

// ===== 演算 =====
function op(o){
    if(operation && !shouldReset) calculate();
    prevInput=currentInput;
    operation=o;
    shouldReset=true;
}

function calculate(){
    let a=parseFloat(prevInput);
    let b=parseFloat(currentInput);
    let r;

    switch(operation){
        case "+": r=a+b; break;
        case "-": r=a-b; break;
        case "*": r=a*b; break;
        case "/": r=(b===0)?Infinity:a/b; break;
        case "pow": r=Math.pow(a,b); break;
        default:return;
    }

    currentInput=formatNumber(r);
    operation=null;
    shouldReset=true;
    update();
}

// ===== メモリ =====
function mem(type){
    let v=parseFloat(currentInput)||0;
    if(type==="m+") memory+=v;
    if(type==="m-") memory-=v;
    if(type==="mr"){
        currentInput=formatNumber(memory);
        shouldReset=true;
    }
    if(type==="mc") memory=0;
    update();
}

// ===== クリア =====
function allClear(){
    currentInput="0";
    prevInput="";
    operation=null;
    shouldReset=false;
    resetFraction();
    update();
}

function clearEntry(){
    currentInput="0";
    update();
}

// ===== 関数 =====
function fn(type){
    let v=parseFloat(currentInput)||0;

    switch(type){
        case "sq": currentInput=formatNumber(v*v); break;
        case "sqrt": currentInput=v<0?"ERROR":formatNumber(Math.sqrt(v)); break;
        case "inv": currentInput=v===0?"ERROR":formatNumber(1/v); break;
        case "pi":
            currentInput="3.141592653";
            shouldReset=true;
            break;
        case "pm": currentInput=formatNumber(-v); break;
        case "pow":
            operation="pow";
            prevInput=currentInput;
            shouldReset=true;
            break;
    }

    update();
}

// 初期表示
update();

</script>

</body>
</html>
