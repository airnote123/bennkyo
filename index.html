<script>
        const lcd = document.getElementById('lcd');

        let currentInput = "0";
        let prevInput = "";
        let operation = null;
        let shouldReset = false;
        let memory = 0;

        let fractionData = {
            whole: null,
            denominator: null,
            numerator: null,
            isEntryMode: false
        };

        function updateDisplay() {
            let html = `
                <div class="lcd-indicators">
                    <span style="visibility: ${memory !== 0 ? 'visible' : 'hidden'}">M</span>
                </div>
            `;

            // 分数表示の判定: 入力モード中、または分母が確定している場合
            if (fractionData.isEntryMode || fractionData.denominator !== null) {
                let w = fractionData.whole;
                let d = fractionData.denominator;
                
                // 「分の」を押す前は今の入力が「分母」、押した後は「分子」
                let displayDen = (d === null) ? currentInput : d;
                let displayNum = (d === null) ? "" : currentInput;

                html += `
                    <div class="fraction-display">
                        ${w !== null ? `<div class="frac-whole">${w}</div>` : ''}
                        <div class="frac-stack">
                            <div class="frac-num">${displayNum || '&nbsp;'}</div>
                            <div class="frac-line"></div>
                            <div class="frac-den">${displayDen || '0'}</div>
                        </div>
                    </div>
                `;
            } else {
                // 通常表示（πや計算結果など）
                html += `<div class="lcd-main-val">${currentInput}</div>`;
            }

            if (operation && operation !== 'pow') {
                const symbols = {'/': '÷', '*': '×', '+': '+', '-': '-'};
                html += `<div class="op-symbol">${symbols[operation]}</div>`;
            }

            lcd.innerHTML = html;
        }

        function num(n) {
            if (shouldReset) {
                currentInput = "";
                shouldReset = false;
            }

            if (n === '.') {
                if (currentInput.includes('.')) return;
                if (currentInput === "" || currentInput === "0") currentInput = "0.";
                else currentInput += ".";
            } else {
                if (currentInput === "0") currentInput = n.toString();
                else if (currentInput.length < 10) currentInput += n.toString();
            }
            updateDisplay();
        }

        function backspace() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = "0";
            }
            updateDisplay();
        }

        function fracAction(type) {
            if (type === 'to') {
                fractionData.whole = currentInput;
                currentInput = "0";
                fractionData.isEntryMode = true;
                shouldReset = false;
            } else if (type === 'bunnno') {
                fractionData.denominator = currentInput;
                currentInput = "0";
                fractionData.isEntryMode = true;
                shouldReset = false;
            } else if (type === 'shosuu') {
                if (fractionData.isEntryMode || fractionData.denominator !== null) {
                    let val = getFractionNumericValue();
                    resetFractionState();
                    currentInput = formatNumber(val);
                } else {
                    decimalToFraction(parseFloat(currentInput));
                }
                shouldReset = true;
            } else if (type === 'taikari') {
                if (fractionData.whole !== null && fractionData.denominator !== null) {
                    let w = parseInt(fractionData.whole);
                    let d = parseInt(fractionData.denominator);
                    let n = parseInt(currentInput);
                    currentInput = (w * d + n).toString();
                    fractionData.whole = null;
                } else if (fractionData.whole === null && fractionData.denominator !== null) {
                    let n = parseInt(currentInput);
                    let d = parseInt(fractionData.denominator);
                    if (d !== 0 && n >= d) {
                        fractionData.whole = Math.floor(n / d).toString();
                        currentInput = (n % d).toString();
                    }
                }
            }
            updateDisplay();
        }

        function getFractionNumericValue() {
            let w = fractionData.whole !== null ? parseFloat(fractionData.whole) : 0;
            let d = fractionData.denominator !== null ? parseFloat(fractionData.denominator) : 1;
            let n = parseFloat(currentInput);
            return w + (n / (d === 0 ? 1 : d));
        }

        function formatNumber(num) {
            if (isNaN(num)) return "Error";
            if (!isFinite(num)) return "Error";
            let s = num.toString();
            if (s.length > 10) s = num.toPrecision(9).toString();
            return s.substring(0, 10);
        }

        function decimalToFraction(val) {
            const eps = 1.0E-9;
            let x = Math.abs(val);
            let whole = Math.floor(x);
            x -= whole;
            
            if (x < eps) {
                fractionData.whole = (val < 0 ? "-" : "") + whole.toString();
                fractionData.denominator = "1";
                currentInput = "0";
            } else {
                let p1 = 1, q1 = 0, p2 = Math.floor(x), q2 = 1;
                let r = x - p2;
                while (r > eps && q2 < 1000) {
                    let a = Math.floor(1.0 / r);
                    r = 1.0 / r - a;
                    let nextP = a * p2 + p1;
                    let nextQ = a * q2 + q1;
                    if (nextQ > 1000) break;
                    p1 = p2; p2 = nextP;
                    q1 = q2; q2 = nextQ;
                }
                fractionData.whole = whole > 0 ? (val < 0 ? "-" : "") + whole.toString() : (val < 0 ? "-" : null);
                fractionData.denominator = q2.toString();
                currentInput = p2.toString();
            }
            fractionData.isEntryMode = true;
        }

        function op(o) {
            let val = getActiveValue();
            if (operation && !shouldReset) calculate();
            prevInput = val.toString();
            operation = o;
            shouldReset = true;
            resetFractionState();
            updateDisplay();
        }

        function getActiveValue() {
            if (fractionData.isEntryMode || fractionData.denominator !== null) {
                return getFractionNumericValue();
            }
            return parseFloat(currentInput);
        }

        function calculate() {
            if (!operation) return;
            let v1 = parseFloat(prevInput);
            let v2 = getActiveValue();
            let result;

            switch(operation) {
                case '+': result = v1 + v2; break;
                case '-': result = v1 - v2; break;
                case '*': result = v1 * v2; break;
                case '/': result = v1 / v2; break;
                case 'pow': result = Math.pow(v1, v2); break;
            }

            currentInput = formatNumber(result);
            resetFractionState();
            operation = null;
            shouldReset = true;
            updateDisplay();
        }

        function mem(type) {
            let val = getActiveValue();
            if (type === 'm+') memory += val;
            if (type === 'm-') memory -= val;
            if (type === 'mr') { 
                currentInput = formatNumber(memory);
                shouldReset = true; 
                resetFractionState();
            }
            if (type === 'mc') memory = 0;
            updateDisplay();
        }

        function allClear() {
            currentInput = "0"; prevInput = ""; operation = null; 
            resetFractionState();
            updateDisplay();
        }

        function clearEntry() {
            currentInput = "0";
            updateDisplay();
        }

        function resetFractionState() {
            fractionData = { whole: null, denominator: null, numerator: null, isEntryMode: false };
        }

        function fn(type) {
            let val = getActiveValue();
            if (type === 'sq') { currentInput = formatNumber(val * val); resetFractionState(); }
            if (type === 'sqrt') { currentInput = formatNumber(Math.sqrt(val)); resetFractionState(); }
            if (type === 'inv') { currentInput = formatNumber(1 / val); resetFractionState(); }
            if (type === 'pi') { 
                resetFractionState(); // 分数モードを解除
                currentInput = "3.14159265"; 
                shouldReset = true; 
            }
            if (type === 'pm') {
                if (fractionData.isEntryMode) {
                    if (fractionData.whole) {
                        fractionData.whole = (parseFloat(fractionData.whole) * -1).toString();
                    } else {
                        currentInput = (parseFloat(currentInput) * -1).toString();
                    }
                } else {
                    currentInput = formatNumber(val * -1);
                }
            }
            if (type === 'ran') { currentInput = Math.random().toFixed(3).toString(); resetFractionState(); }
            if (type === 'perc') { currentInput = formatNumber(val / 100); resetFractionState(); }
            if (type === 'pow') {
                 operation = 'pow';
                 prevInput = val.toString();
                 shouldReset = true;
                 resetFractionState();
            }
            updateDisplay();
        }

        updateDisplay();
    </script>
