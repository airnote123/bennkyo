<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASIO AZ-90J Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --bg-color: #1e2021;
            --lcd-bg: #b8c2a9;
            --orange-btn: #c98e3d;
            --blue-btn: #6a9696;
            --grey-btn: #4a4c4e;
            --dark-grey-btn: #323436;
            --red-btn: #a34d3d;
            --ac-btn: #8c4235;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .calculator {
            width: 320px;
            height: 550px;
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            user-select: none;
            border: 1px solid #111;
        }

        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 5px;
        }

        .brand-info { color: white; line-height: 1; }
        .brand-name { font-weight: 800; font-size: 1.2rem; letter-spacing: 0.5px; }
        .study-cal-tag {
            font-size: 0.6rem;
            background-color: #3b7a7a;
            padding: 1px 4px;
            font-style: italic;
            border-radius: 1px;
            margin-top: 4px;
            display: inline-block;
            color: #d1eeee;
        }
        .model-num { font-size: 0.55rem; color: #888; margin-top: 3px; }

        .solar-area {
            width: 100px;
            height: 34px;
            background: #111;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .solar-cells { width: 85%; height: 60%; background: linear-gradient(90deg, #221111 0%, #331a1a 50%, #221111 100%); display: flex; gap: 2px; }
        .solar-cell { flex: 1; border-right: 1px solid #111; }
        .solar-text { font-size: 0.4rem; color: #665; letter-spacing: 0.5px; margin-top: 2px; }

        .display-frame { background-color: #0c0d0d; padding: 12px; border-radius: 6px; margin-bottom: 5px; }
        .lcd-screen {
            background-color: var(--lcd-bg);
            height: 85px;
            border-radius: 3px;
            box-shadow: inset 3px 3px 8px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 5px 40px 5px 10px;
            position: relative;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: #1a1d16;
        }

        .lcd-indicators {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.75rem;
            opacity: 0.9;
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            font-weight: bold;
        }

        .lcd-main-val { 
            font-size: 3.2rem;
            letter-spacing: -2px;
            line-height: 1;
            text-align: right;
        }

        .fraction-layout {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            text-align: right;
        }
        .frac-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-left: 6px;
        }
        .frac-line {
            width: 120%;
            height: 3px;
            background-color: #1a1d16;
            margin: 2px 0;
        }
        .frac-num, .frac-den { 
            font-size: 1.3rem; 
            min-width: 24px; 
            text-align: center; 
            line-height: 1;
        }
        .frac-whole { font-size: 3.2rem; margin-right: 6px; }

        /* 液晶内の演算子位置 */
        .op-symbol {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.8rem;
            font-weight: bold;
            width: 20px;
            text-align: center;
        }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); /* 5列に修正して右端を揃える */
            gap: 7px; 
            flex-grow: 1; 
        }

        .btn {
            height: 38px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 0 #000;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #000; }
        .btn-orange { background-color: var(--orange-btn); }
        .btn-blue { background-color: var(--blue-btn); }
        .btn-grey { background-color: var(--grey-btn); }
        .btn-dark { background-color: var(--dark-grey-btn); }
        .btn-red { background-color: var(--red-btn); }
        .btn-ac { background-color: var(--ac-btn); }

        .label-jp { font-size: 0.65rem; letter-spacing: -0.5px; font-weight: bold; }
        .label-xs { font-size: 0.6rem; }
        .span-2 { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="top-panel">
            <div class="brand-info">
                <div class="brand-name">CASIO</div>
                <div class="study-cal-tag">STUDY CAL</div>
                <div class="model-num">AZ-90J</div>
            </div>
            <div class="solar-area">
                <div class="solar-cells">
                    <div class="solar-cell"></div><div class="solar-cell"></div><div class="solar-cell"></div><div class="solar-cell"></div>
                </div>
                <div class="solar-text">TWO WAY POWER</div>
            </div>
        </div>

        <div class="display-frame">
            <div class="lcd-screen" id="lcd">
                <!-- JS描画 -->
            </div>
        </div>

        <!-- 5列構成で演算子を一番右の列に統一 -->
        <div class="grid-container">
            <!-- 1段目 -->
            <div class="btn btn-orange label-xs" onclick="fn('inv')">1/x</div>
            <div class="btn btn-orange label-xs" onclick="fn('sq')">x²</div>
            <div class="btn btn-orange" onclick="num('(')">(</div>
            <div class="btn btn-orange" onclick="num(')')">)</div>
            <div class="btn btn-orange label-xs" onclick="fn('pow')">x<sup>y</sup></div>

            <!-- 2段目 -->
            <div class="btn btn-orange label-xs" onclick="fn('pm')">+/-</div>
            <div class="btn btn-orange label-jp" onclick="fracAction('to')">と</div>
            <div class="btn btn-orange label-jp" onclick="fracAction('bunnno')">分の</div>
            <div class="btn btn-orange label-jp" onclick="fracAction('shosuu')">分小</div>
            <div class="btn btn-orange label-jp" onclick="fracAction('taikari')">帯仮</div>

            <!-- 3段目 (MC-M+の段) -->
            <div class="btn btn-dark" onclick="backspace()">▶</div>
            <div class="btn btn-blue label-xs" onclick="mem('mc')">MC</div>
            <div class="btn btn-blue label-xs" onclick="mem('mr')">MR</div>
            <div class="btn btn-blue label-xs" onclick="mem('m-')">M-</div>
            <div class="btn btn-grey" onclick="op('/')">÷</div>

            <!-- 4段目 -->
            <div class="btn btn-blue label-xs" onclick="mem('m+')">M+</div>
            <div class="btn btn-dark" onclick="num(7)">7</div>
            <div class="btn btn-dark" onclick="num(8)">8</div>
            <div class="btn btn-dark" onclick="num(9)">9</div>
            <div class="btn btn-grey" onclick="op('*')">×</div>

            <!-- 5段目 -->
            <div class="btn btn-grey" onclick="fn('perc')">%</div>
            <div class="btn btn-dark" onclick="num(4)">4</div>
            <div class="btn btn-dark" onclick="num(5)">5</div>
            <div class="btn btn-dark" onclick="num(6)">6</div>
            <div class="btn btn-grey" onclick="op('-')">-</div>

            <!-- 6段目 -->
            <div class="btn btn-red" onclick="clearEntry()">C</div>
            <div class="btn btn-dark" onclick="num(1)">1</div>
            <div class="btn btn-dark" onclick="num(2)">2</div>
            <div class="btn btn-dark" onclick="num(3)">3</div>
            <div class="btn btn-grey" onclick="op('+')">+</div>

            <!-- 7段目 -->
            <div class="btn btn-ac" onclick="allClear()">AC</div>
            <div class="btn btn-dark" onclick="num(0)">0</div>
            <div class="btn btn-dark" onclick="num('.')">.</div>
            <div class="btn btn-grey span-2" onclick="calculate()">=</div>
        </div>
    </div>

    <script>
        const lcd = document.getElementById('lcd');

        let currentInput = "0";
        let prevInput = "";
        let operation = null;
        let shouldReset = false;
        let memory = 0;

        let fraction = {
            whole: "",
            numerator: "",
            denominator: "",
            active: "none"
        };

        function updateDisplay() {
            let html = `
                <div class="lcd-indicators">
                    <span style="visibility: ${memory !== 0 ? 'visible' : 'hidden'}">M</span>
                    <span>K</span>
                </div>
            `;

            if (fraction.active !== "none" || fraction.denominator || fraction.numerator || fraction.whole) {
                html += `
                    <div class="fraction-layout">
                        <div class="frac-whole">${fraction.whole || (fraction.active === 'none' ? '' : (fraction.active === 'whole' ? currentInput : ''))}</div>
                        ${(fraction.numerator || fraction.active === 'numerator' || fraction.denominator || fraction.active === 'denominator') ? `
                        <div class="frac-group">
                            <div class="frac-num">${fraction.numerator || (fraction.active === 'numerator' ? currentInput : '') || '&nbsp;'}</div>
                            <div class="frac-line"></div>
                            <div class="frac-den">${fraction.denominator || (fraction.active === 'denominator' ? currentInput : '') || '&nbsp;'}</div>
                        </div>` : ''}
                    </div>
                `;
            } else {
                html += `<div class="lcd-main-val">${currentInput}</div>`;
            }

            if (operation) {
                const symbols = {'/': '÷', '*': '×', '+': '+', '-': '-'};
                html += `<div class="op-symbol">${symbols[operation]}</div>`;
            }

            lcd.innerHTML = html;
        }

        function num(n) {
            if (shouldReset) {
                currentInput = n.toString();
                shouldReset = false;
            } else {
                if (currentInput === "0") currentInput = n.toString();
                else if (currentInput.length < 10) currentInput += n.toString();
            }
            updateDisplay();
        }

        function backspace() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = "0";
            }
            updateDisplay();
        }

        function fracAction(type) {
            if (type === 'bunnno') {
                if (fraction.active === "none") {
                    fraction.denominator = currentInput;
                    fraction.active = "numerator";
                    currentInput = "";
                }
            } else if (type === 'to') {
                fraction.whole = currentInput;
                currentInput = "";
                fraction.active = "none"; 
            } else if (type === 'shosuu') {
                const val = getFractionValue();
                allClear();
                currentInput = val.toString().substring(0, 10);
            } else if (type === 'taikari') {
                if (fraction.whole && (fraction.numerator || currentInput) && fraction.denominator) {
                    const w = parseInt(fraction.whole) || 0;
                    const n = parseInt(fraction.numerator || currentInput) || 0;
                    const d = parseInt(fraction.denominator) || 1;
                    fraction.numerator = (w * d + n).toString();
                    fraction.whole = "";
                    currentInput = "";
                }
            }
            updateDisplay();
        }

        function getFractionValue() {
            let activeVal = parseFloat(currentInput) || 0;
            let w = fraction.whole ? parseFloat(fraction.whole) : 0;
            let n = fraction.numerator ? parseFloat(fraction.numerator) : 0;
            let d = fraction.denominator ? parseFloat(fraction.denominator) : 1;

            if (fraction.active === 'numerator') n = activeVal;
            if (fraction.active === 'denominator') d = activeVal;
            
            if (d === 0) return 0;
            return w + (n / d);
        }

        function op(o) {
            if (fraction.active !== "none" || fraction.denominator) {
                currentInput = getFractionValue().toString();
                resetFraction();
            }
            if (operation && !shouldReset) calculate();
            prevInput = currentInput;
            operation = o;
            shouldReset = true;
            updateDisplay();
        }

        function calculate() {
            let val = (fraction.active !== "none" || fraction.denominator) ? getFractionValue() : parseFloat(currentInput);
            let prev = parseFloat(prevInput);
            let result;

            if (!operation) return;

            switch(operation) {
                case '+': result = prev + val; break;
                case '-': result = prev - val; break;
                case '*': result = prev * val; break;
                case '/': result = prev / val; break;
            }

            currentInput = result.toString().substring(0, 10);
            resetFraction();
            operation = null;
            shouldReset = true;
            updateDisplay();
        }

        function mem(type) {
            let val = parseFloat(currentInput);
            if (type === 'm+') memory += val;
            if (type === 'm-') memory -= val;
            if (type === 'mr') { currentInput = memory.toString(); shouldReset = true; resetFraction(); }
            if (type === 'mc') memory = 0;
            updateDisplay();
        }

        function allClear() {
            currentInput = "0"; prevInput = ""; operation = null; resetFraction();
            updateDisplay();
        }

        function clearEntry() {
            currentInput = "0";
            updateDisplay();
        }

        function resetFraction() {
            fraction = { whole: "", numerator: "", denominator: "", active: "none" };
        }

        function fn(type) {
            let val = parseFloat(currentInput);
            if (type === 'sq') currentInput = (val * val).toString();
            if (type === 'sqrt') currentInput = Math.sqrt(val).toString();
            if (type === 'inv') currentInput = (1 / val).toString();
            if (type === 'pi') currentInput = Math.PI.toString();
            if (type === 'pm') currentInput = (val * -1).toString();
            currentInput = currentInput.substring(0, 10);
            updateDisplay();
        }

        updateDisplay();
    </script>
</body>
</html>
